<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
        margin: 0;
        padding: 0;;
    }
    #hero_area{
        background-image: url(pic.img.jpg);
        background-size: cover;
        padding: 100px 20px;
        text-align: center;
        font-family: 'Courier New', Courier, monospace;
        z-index: 9;
    }
    #hero_area h2{
        color:azure;
        font-size: 35px;
        margin-bottom: 0;

    }
     #hero_area p{
        color:azure;
        font-size: 35px;
        margin-bottom: 0;
     }
     #hero_area .btn{
      background: brown;
        color: aqua;
        font-size: 14px;
        padding: 12px 30px;

        font-family: sans-serif;
        border-radius: 10PX;
        display: inline-block;
     }
     #hero_area .btn:hover{
        background:blueviolet;
     }
     .bg{
        position: relative;
        background: red;
        width: 100%;
        height: 100%;
        top:0;
        left: 0;
        opacity:0.8;
        z-index: -1;;
     }

  </style>
</head>

<body>
 <section id="hero_area">
    <div class="bg"></div>
    <h2>Hello</h2>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Molestiae, velit.</p>
    <a class="btn" href="">Contact us</a>
 </section>
</body>

</html>
